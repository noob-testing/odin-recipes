<h1>Tuna Rice Bowl</h1>
<img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Spicy_tuna_rice_bowl_%2835032450572%29.jpg"
    alt="Tuna Rice Bowl">
<h1>Description</h1>
<p>This bowl is full of vitamins and minerals!</p>
<h1>Ingredients</h1>
<ul>
    <li>1 cup uncooked long-grain rice</li>
    <li>1 ½ cups water</li>
    <li>1 (7 ounce) jar tuna packed in olive oil</li>
    <li>⅓ cup seasoned rice vinegar</li>
    <li>1 teaspoon finely sliced green onion, or to taste</li>
</ul>
